server.port=${PORT:8080}

# ─── Database ──────────────────────────────────────────
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/coding_platform?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ─── Redis (use full URL for Upstash TLS support) ──────
# rediss:// = TLS, redis:// = plain
spring.data.redis.url=${REDIS_URL:redis://localhost:6379}

# ─── JWT ───────────────────────────────────────────────
jwt.secret=${JWT_SECRET:MyVerySecretKeyForJWTTokenGenerationThatIsAtLeast256BitsLong!}
jwt.expiration=86400000

# ─── CORS (comma-separated for multiple origins) ──────
cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000}

# ─── Cookie settings (production: secure=true, same-site=None) ──
cookie.secure=${COOKIE_SECURE:false}
cookie.same-site=${COOKIE_SAME_SITE:Lax}

# ─── Email (Gmail SMTP) ───────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
# ─── EmailJS API ──────────────────────────────────────
emailjs.service.id=${EMAILJS_SERVICE_ID:}
emailjs.template.id=${EMAILJS_TEMPLATE_ID:}
emailjs.public.key=${EMAILJS_PUBLIC_KEY:}
emailjs.private.key=${EMAILJS_PRIVATE_KEY:}

# ─── External APIs ────────────────────────────────────
abstract.api.key=${ABSTRACT_API_KEY:}
onlinecompiler.api.key=${COMPILER_API_KEY:}
onlinecompiler.api.url=https://api.onlinecompiler.io/api/run-code-sync/
groq.api.key=${GROQ_API_KEY:}
groq.api.url=https://api.groq.com/openai/v1/chat/completions

seed.problems=true